name: Build GTA SA AML Mod

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Verify NDK
        run: |
          echo "NDK: $ANDROID_NDK_ROOT"
          $ANDROID_NDK_ROOT/ndk-build --version

      - name: Build AML Mod
        run: |
          $ANDROID_NDK_ROOT/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=Android.mk \
            NDK_APPLICATION_MK=Application.mk \
            NDK_DEBUG=0 \
            -j$(nproc)

      - name: List output
        run: find libs -type f

      - name: Upload arm64
        uses: actions/upload-artifact@v4
        with:
          name: arm64-v8a
          path: libs/arm64-v8a/*.so

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: armeabi-v7a
          path: libs/armeabi-v7a/*.so
